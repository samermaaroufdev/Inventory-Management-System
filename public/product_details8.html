<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/product_details.css">
    <link rel="icon" type="image/png" href="icons8-product-management-48.png">
</head>
<body>
<header class="header">
    <nav class="nav">
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="add_product.html" style="background-color: #007bff; padding: 8px 15px; border-radius: 5px;">Add Product</a>
    </nav>
</header>
<div class="container text-center">
    <div class="row">
        <div class="col-12">
            <img src="https://clemarkets.com/cdn/shop/files/RedmiWatch5.jpg?v=1771498633&width=990" alt="Redmi Watch 5" class="product-img img-fluid">
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-10 table-container">
            <h2 class="mb-4">Product Details</h2>
            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Product ID</th>
                            <th>Name</th>
                            <th>Quantity</th>
                            <th>Supplier</th>
                            <th>Date of Last Received</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#PRD-108</td>
                            <td>Redmi Watch 5</td>
                            <td>42</td>
                            <td>MiCare</td>
                            <td>November 14, 2025</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
