<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="text-dark-emphasis">
    <h1 class="text-center mt-5 mb-5 text-secondary fs-3">Order a product here</h1>
    <form class="border mb-5">
        <legend class="text-dark-emphasis text-center">User Information</legend>
        <div class="w-50 ms-3 mb-3">
            <label for="id" class="form-label">ID</label>
            <input type="text" class="form-control" id="id" name="id" required>
        </div>
        <div class="w-50 ms-3 mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="w-50 ms-3 mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" required name="email" placeholder="name@example.com">
        </div>
        <div class="w-50 ms-3 mb-3">
            <label for="name" class="form-label"> Company name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
    </form>
    <form class="border mb-5">
        <legend class="text-center text-dark-emphasis mb-5 mt-3">Address Information</legend>
        <div class="w-50 ms-3 mb-3">
            <select name="country" class="form-select" id="country" required>
                <option selected value="lebanon">Lebanon</option>
                <option value="USA">USA</option>
                <option value="UAE">UAE</option>
                <option value="china">China</option>
                <option value="Japan">Japan</option>
            </select>
        </div>
        <div class="w-50 ms-3 mb-4">
            <select name="district" class="form-select" id="district" required>
                <option selected value="aley">Aley</option>
                <option value="beirut">Beirut</option>
                <option value="washington">Washington</option>
                <option value="new-york">New York</option>
                <option value="bejing">Bejing</option>
                <option value="tokyo">Tokyo</option>
            </select>
        </div>
        <div class="w-50 ms-3 mb-3">
            <label for="location" class="form-label">Street/Building location</label>
            <input type="text" class="form-control" id="location" name="location" required>
        </div>
    </form>
    <form class="border mb-5">
        <legend class="text-dark-emphasis text-center">Product Information</legend>
        <div class="w-50 ms-3 mb-3">
            <label for="id" class="form-label">Product ID</label>
            <input type="text" class="form-control" id="id" name="id" required>
        </div>
        <div class="w-50 ms-3 mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="ms-3 mb-3" style="width:10%;">
            <label for="qty" class="form-label">Quantity</label>
            <input type="number" class="form-control" name="qty" id="qty" required>
        </div>
        <div class="w-50 ms-3 mb-3">
            <label for="name" class="form-label">Supplier Name</label>
            <input type="text" class="form-control" name="name" id="name" required>
        </div>
    </form>
        <button class=" m-4 btn btn-primary bottom-0 end-0" type="submit">Submit</button>
</body>
</html>
